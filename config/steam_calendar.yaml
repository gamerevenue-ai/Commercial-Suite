# Discount rules (from Steamworks documentation — public)
discount_rules:
  cooldown_days: 30          # Minimum days between discounts on Steam
  new_release_window_days: 30 # Can't discount within 30 days of launch
  seasonal_sale_min_pct: 10  # Minimum discount to appear in seasonal sale feed
  max_discount_pct: 90       # Steam caps discounts at 90%
  intro_offer_max_pct: 10    # Launch week intro offer capped at 10% for first 30 days
  typical_first_discount: 20 # Most studios do 20-33% for first major sale
