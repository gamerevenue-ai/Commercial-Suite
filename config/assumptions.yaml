# ----------------------------------------------------------------------------
# DATA COLLECTION SETTINGS
# ----------------------------------------------------------------------------
review_collection:
  lookback_months: 24          # how far back to fetch review timestamps
  max_reviews_to_fetch: 5000   # pagination cap to avoid bogging down on huge titles
  cache_ttl_hours: 24          # how long to cache API responses locally
  rate_limit_sleep_seconds: 0.6  # sleep between API calls to avoid rate limiting

# ----------------------------------------------------------------------------
# ESTIMATION CONFIDENCE FRAMEWORK
# ----------------------------------------------------------------------------
# Outputs are labeled with one of these confidence levels.
# Users should treat all outputs as ranges, not facts.
# ----------------------------------------------------------------------------
confidence_levels:
  high:
    label: "Higher Confidence"
    description: "Based on observed public data with limited assumptions."
    color: "#70AD47"
  medium:
    label: "Medium Confidence"
    description: "Derived metric with calibrated heuristic assumptions."
    color: "#FFC000"
  low:
    label: "Lower Confidence"
    description: "Speculative estimate. Treat as directional only."
    color: "#E05C5C"

